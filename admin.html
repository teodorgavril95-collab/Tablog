<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLOG | Core Management Workspace</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #030706; }</style>
</head>
<body class="text-gray-200 font-sans antialiased selection:bg-[#00FF66] selection:text-black">

    <div id="admin-login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-neutral-950 border border-emerald-950 rounded-2xl p-8 shadow-2xl space-y-6">
            <div class="text-center">
                <span class="text-[10px] tracking-widest text-emerald-500 font-mono block uppercase">Terminal Desktop Security</span>
                <h2 class="text-lg font-black text-white tracking-widest mt-1">TABLOG TERMINAL</h2>
            </div>
            <form onsubmit="executeAdminWorkspaceLogin(event)" class="space-y-4">
                <input type="password" required id="login-password" placeholder="Passphrase key token..." class="w-full bg-neutral-900 border border-emerald-950 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-[#00FF66]">
                <button type="submit" class="w-full py-3 bg-[#00FF66] text-black font-black text-xs uppercase tracking-widest rounded-xl cursor-pointer">Unlock Node</button>
            </form>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden min-h-screen flex flex-col">
        <header class="bg-neutral-950 border-b border-emerald-950/40 px-8 py-4 flex justify-between items-center">
            <div class="text-sm font-black tracking-wider text-white">TABLOG // <span class="text-[#00FF66]">CORE</span></div>
            <div class="flex items-center gap-4 text-xs">
                <a href="index.html" class="text-gray-400 hover:text-[#00FF66] transition"><i class="fa-solid fa-globe mr-1"></i> Live Hub</a>
                <button onclick="location.reload()" class="text-gray-500 hover:text-white cursor-pointer">Disconnect</button>
            </div>
        </header>

        <main class="p-8 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="bg-neutral-950 border border-emerald-950 p-6 rounded-2xl space-y-4 h-fit">
                <h3 class="font-black text-sm text-white uppercase"><i class="fa-solid fa-file-arrow-up text-[#00FF66] mr-1.5"></i> Add File Node</h3>
                
                <form id="artwork-upload-form" onsubmit="commitNewAssetToDatabase(event)" class="space-y-3 text-xs">
                    <input type="text" id="art-title" required placeholder="Asset Configuration Name *" class="w-full bg-neutral-900 border border-emerald-950/50 rounded-lg px-3 py-2 text-white">
                    <input type="number" id="art-price" required placeholder="Valuation Scale (€) *" class="w-full bg-neutral-900 border border-emerald-950/50 rounded-lg px-3 py-2 text-white">
                    <input type="text" id="art-dims" placeholder="Dimensions Specs" class="w-full bg-neutral-900 border border-emerald-950/50 rounded-lg px-3 py-2 text-white">
                    <textarea id="art-desc" rows="2" placeholder="System parameter metrics data overview description..." class="w-full bg-neutral-900 border border-emerald-950/50 rounded-lg p-3 text-white resize-none"></textarea>
                    
                    <div class="space-y-2 pt-2">
                        <label class="block text-[10px] uppercase font-bold text-gray-500 font-mono">Image File Inputs (Max 3 Multi-Angle)</label>
                        <input type="file" id="file-1" required accept="image/*" class="w-full text-xs text-gray-500 file:bg-neutral-900 file:text-white file:border-0 file:rounded-md file:px-2 file:py-1 cursor-pointer">
                        <input type="file" id="file-2" accept="image/*" class="w-full text-xs text-gray-500 file:bg-neutral-900 file:text-white file:border-0 file:rounded-md file:px-2 file:py-1 cursor-pointer">
                        <input type="file" id="file-3" accept="image/*" class="w-full text-xs text-gray-500 file:bg-neutral-900 file:text-white file:border-0 file:rounded-md file:px-2 file:py-1 cursor-pointer">
                    </div>

                    <button type="submit" class="w-full py-3 bg-white text-black hover:bg-[#00FF66] font-black uppercase tracking-widest rounded-xl transition cursor-pointer mt-4">Deploy File Node</button>
                </form>
            </section>

            <section class="lg:col-span-2 space-y-4">
                <h3 class="font-black text-sm text-white uppercase tracking-wider">Active Buffered Directory</h3>
                <div id="admin-inventory-list" class="space-y-2"></div>
            </section>
        </main>
    </div>

    <script>
        let inventoryArray = JSON.parse(localStorage.getItem('tablog_inventory')) || [];

        function executeAdminWorkspaceLogin(event) {
            event.preventDefault();
            if(document.getElementById('login-password').value === "admin123") {
                document.getElementById('admin-login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                renderAdminControlPanelsRows();
            } else { alert("Cleared Token Invalid."); }
        }

        function renderAdminControlPanelsRows() {
            const list = document.getElementById('admin-inventory-list'); list.innerHTML = '';
            if(inventoryArray.length === 0) { list.innerHTML = `<p class="text-xs text-gray-600 font-mono p-4">No data nodes loaded in local cache arrays.</p>`; return; }
            inventoryArray.forEach(entry => {
                list.innerHTML += `
                    <div class="bg-neutral-950 border border-emerald-950/40 p-4 rounded-xl flex items-center justify-between gap-4 text-xs">
                        <div class="flex items-center gap-3">
                            <img src="${entry.images[0]}" class="w-10 h-10 object-cover rounded border border-emerald-950">
                            <div>
                                <h4 class="font-bold text-white">${entry.title}</h4>
                                <p class="text-[10px] font-mono text-gray-500">€${entry.price} &bull; ${entry.dimensions}</p>
                            </div>
                        </div>
                        <button onclick="purgeInventoryEntryRow(${entry.id})" class="text-gray-500 hover:text-red-400 cursor-pointer"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        }

        function processFileAsDataURL(fileInputNode) {
            return new Promise((resolve) => {
                if (!fileInputNode || !fileInputNode.files || fileInputNode.files.length === 0) return resolve(null);
                const reader = new FileReader(); reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(fileInputNode.files[0]);
            });
        }

        async function commitNewAssetToDatabase(event) {
            event.preventDefault();
            const img1 = await processFileAsDataURL(document.getElementById('file-1'));
            const img2 = await processFileAsDataURL(document.getElementById('file-2'));
            const img3 = await processFileAsDataURL(document.getElementById('file-3'));

            const title = document.getElementById('art-title').value;
            const price = parseInt(document.getElementById('art-price').value);
            const dimensions = document.getElementById('art-dims').value || "Variable Sizes";
            const description = document.getElementById('art-desc').value;

            inventoryArray.unshift({ id: Date.now(), title, price, dimensions, description, images: [img1, img2, img3].filter(Boolean) });
            localStorage.setItem('tablog_inventory', JSON.stringify(inventoryArray));
            renderAdminControlPanelsRows();
            alert("🎉 Module successfully integrated into the Local Directory Cache!");
            document.getElementById('artwork-upload-form').reset();
        }

        function purgeInventoryEntryRow(id) {
            if(confirm("Erase entry data sequence layout?")) {
                inventoryArray = inventoryArray.filter(i => i.id !== id);
                localStorage.setItem('tablog_inventory', JSON.stringify(inventoryArray));
                renderAdminControlPanelsRows();
            }
        }
    </script>
</body>
</html>
